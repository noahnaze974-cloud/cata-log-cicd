services:
  web:
    build: .
    image: catal-log:local
    container_name: catal-log-web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

  info:
    image: traefik/whoami:latest
    container_name: catal-log-info
    ports:
      - "8081:80"
    restart: unless-stopped
