name: 03 - Promote (recette -> production simulee)

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Tag source a promouvoir (ex: latest, sha-xxxxxxx)"
        required: true
        default: "latest"

env:
  REGISTRY: ghcr.io

jobs:
  validation-recette:
    runs-on: ubuntu-latest
    environment: recette
    permissions:
      packages: read
    steps:
      - name: Nom d'image en minuscules
        id: img
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull + test de l'image source
        run: |
          SRC=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ inputs.source_tag }}
          docker pull "$SRC"
          docker run -d --name recette -p 8080:80 "$SRC"
          sleep 3
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "Recette - code HTTP : $code"
          test "$code" = "200"
          docker rm -f recette

  promotion-production:
    needs: validation-recette
    runs-on: ubuntu-latest
    environment: production-simulee
    permissions:
      packages: write
    steps:
      - name: Nom d'image en minuscules
        id: img
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promotion par digest (aucun rebuild)
        run: |
          IMG=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          SRC=$IMG:${{ inputs.source_tag }}
          docker pull "$SRC"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$SRC")
          echo "Artefact promu : $DIGEST"
          docker buildx imagetools create --tag "$IMG:production" "$DIGEST"
          echo "## Promotion reussie (sans rebuild)" >> $GITHUB_STEP_SUMMARY
          echo "Digest promu : $DIGEST" >> $GITHUB_STEP_SUMMARY
