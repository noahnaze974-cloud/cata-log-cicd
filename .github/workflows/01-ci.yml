name: 01 - CI (Build & Test)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lint du Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Validation de version.json
        run: |
          jq empty site/version.json
          echo "version.json est un JSON valide."

      - name: Build de l'image Docker
        run: docker build -t catal-log:ci .

      - name: Lancement du conteneur
        run: docker run -d --name test-web -p 8080:80 catal-log:ci

      - name: Attente du démarrage
        run: sleep 3

      - name: Test HTTP (code 200 attendu)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "Code HTTP reçu : $code"
          test "$code" = "200"

      - name: Test de contenu
        run: |
          curl -s http://localhost:8080 | grep -i "Catal-Log"
          echo "Contenu attendu présent."

      - name: Nettoyage
        if: always()
        run: docker rm -f test-web || true
